<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PokéGuess - Jogo de adivinha de Pokémon com pistas progressivas.">
    <title>PokéGuess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ECRÃ INICIAL -->
  <div id="screen-start" class="screen active">
    <h1>PokéGuess</h1>
    <p>Escolhe o modo de jogo:</p>

    <div>
      <label><input type="radio" name="mode" value="silhouette" checked> Silhueta</label>
      <label><input type="radio" name="mode" value="stats"> Estatísticas</label>
      <label><input type="radio" name="mode" value="typegen"> Tipo + Geração</label>
      <label><input type="radio" name="mode" value="evolution"> Cadeia Evolutiva</label>
    </div>

    <p>Dificuldade:</p>
    <div>
      <label><input type="radio" name="difficulty" value="easy" checked> Fácil</label>
      <label><input type="radio" name="difficulty" value="medium"> Médio</label>
      <label><input type="radio" name="difficulty" value="hard"> Difícil</label>
    </div>

    <button id="btn-start">Iniciar Jogo</button>
    <button id="btn-history">Histórico</button>

  </div>


  <!-- ECRÃ DE JOGO -->
  <div id="screen-game" class="screen">
    <div id="hud">
      <span>Vidas: <span id="lives">3</span></span>
      <span>Pontos: <span id="score">0</span></span>
      <span>Streak: <span id="streak">0</span></span>
    </div>

    <div id="timer-bar-container">
      <div id="timer-bar"></div>
    </div>

    <span id="timer-text">--s</span>

    <div id="game-content">
      <!-- O conteúdo muda conforme o modo -->
    </div>

    <div id="answer-zone">
      <input type="text" id="answer-input" placeholder="Nome do Pokémon..." autocomplete="off">
      <button id="btn-submit">Responder(Enter)</button>
      <button id="btn-hint">Pista(H)</button>
    </div>

    <div id="feedback" class="hidden"></div>

    <button id="btn-quit">Abandonar</button>
  </div>

  <!-- ECRÃ DE HISTÓRICO -->
  <div id="screen-history" class="screen">
    <h1>Histórico</h1>
    <button id="btn-export-csv">Exportar CSV</button>
    <div id="history-list"></div>
    <button id="btn-back-history">Voltar</button>
  </div>

  <!-- ECRÃ DE FIM DE JOGO -->
  <div id="screen-gameover" class="screen">
    <h1 id="gameover-title">Fim de Jogo!</h1>
    <p id="gameover-score"></p>
    <p id="gameover-stats"></p>
    <button id="btn-play-again">Jogar de Novo</button>
    <button id="btn-menu">Menu Principal</button>
  </div>

</body>
</html>
